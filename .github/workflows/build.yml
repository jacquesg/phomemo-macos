name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: universal

      - name: Build universal binaries
        run: make rust

      - name: Verify universal binaries
        run: |
          for bin in build/universal/*; do
            echo "=== $(basename "$bin") ==="
            file "$bin"
            lipo -archs "$bin"
          done

      - name: Run tests
        run: cargo test

      - name: Run tests (with BLE)
        run: cargo test --features ble

      - name: Compile PPDs
        run: make ppd

      - name: Build installer package
        run: make pkg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: phomemo-macos-${{ github.sha }}
          path: dist/*.pkg

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.pkg
          generate_release_notes: true
